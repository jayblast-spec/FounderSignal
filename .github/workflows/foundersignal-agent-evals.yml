name: FounderSignal Agent Evals

on:
  pull_request:
  workflow_dispatch:

jobs:
  artifact-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify agent architecture files
        run: |
          test -f eve-agent/agent.ts
          test -f eve-agent/instructions.md
          test -f eve-agent/tools/compile_intent.ts
          test -f eve-agent/skills/startup-validation.md
          test -f SYSTEM_ARCHITECTURE.md
